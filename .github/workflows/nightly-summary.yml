name: Nightly Roadmap Summary

on:
  schedule:
    # 10 PM ET / 9 PM CT daily — adjust to taste (UTC)
    - cron: "0 2 * * *"
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  send-summary:
    name: Send nightly email summary
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send roadmap summary
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUMMARY_EMAIL: ${{ secrets.SUMMARY_EMAIL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/nightly-summary.mjs
